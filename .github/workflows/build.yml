name: 打包Windows应用

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 安装依赖
      run: npm install

    - name: 打包Windows应用
      run: npm run build

    - name: 上传exe文件
      uses: actions/upload-artifact@v4
      with:
        name: WeFlow-Windows-Setup
        path: release/*.exe
        retention-days: 30
